name: email-analysis
description: Analyze an email for phishing, spam, or malware indicators
triggers:
  - email
  - mail
  - phishing
  - spam
  - suspicious email
steps:
  - agent: sift
    action: vt_lookup
    params:
      indicator: ${input.sender_ip}
    optional: true
  - agent: sift
    action: hash_lookup
    params:
      hash: ${input.attachment_hash}
    optional: true
  - agent: archive
    action: ioc_enrich
    params:
      ioc: ${input.sender_domain}
    optional: true
  - agent: archive
    action: ioc_enrich
    params:
      ioc: ${input.attachment_hash}
    optional: true
  - agent: archive
    action: web_search
    params:
      query: ${input.subject} email phishing
    optional: true
