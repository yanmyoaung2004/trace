name: ip-reputation
description: Check an IP address against threat intel and VT
triggers:
  - ip
  - address
  - reputation
  - check ip
steps:
  - agent: sift
    action: vt_lookup
    params:
      indicator: ${input.ip}
    optional: true
  - agent: archive
    action: ioc_enrich
    params:
      ioc: ${input.ip}
