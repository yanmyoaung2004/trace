name: domain-reputation
description: Check a domain or URL against threat intel and VirusTotal
triggers:
  - domain
  - url
  - site
  - website
  - check domain
  - check url
  - phishing
steps:
  - agent: archive
    action: ioc_enrich
    params:
      ioc: ${input.domain}
  - agent: sift
    action: vt_lookup
    params:
      indicator: ${input.domain}
    optional: true
    timeout: 30s
  - agent: archive
    action: web_search
    params:
      query: ${input.domain} threat intelligence
    optional: true
