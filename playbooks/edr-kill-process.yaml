name: edr-kill-process
description: Kill a process on a remote endpoint via EDR
triggers:
  - kill
  - edr-kill
  - remote kill
  - terminate process
steps:
  - agent: edr
    action: kill_process
    params:
      hostname: ${input.hostname}
      pid: ${input.pid}
    timeout: 30s
  - agent: dispatch
    action: synthesize_report
    params:
      investigation_id: ${investigation.id}
