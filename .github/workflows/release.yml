name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: ./go.sum

      - name: Run tests
        run: go test ./... -short -count=1 -p 2

      - name: Build all platforms
        run: make cross

      - name: Generate checksums
        run: |
          sha256sum.trace-* > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
           .trace-linux-amd64
           .trace-linux-arm64
           .trace-darwin-amd64
           .trace-darwin-arm64
           .trace-windows-amd64.exe
            checksums.txt
          generate_release_notes: true
