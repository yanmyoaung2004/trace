name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Tidy
        run: go mod tidy && git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o innoigniter ./cmd/innoigniter

      - name: Test
        run: go test ./... -short -count=1 -p 2
