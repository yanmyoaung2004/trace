version: "3.9"

services:
  server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - trace_data:/home/trace/.trace
    environment:
      - TRACE_VT_API_KEY=${TRACE_VT_API_KEY:-}
      - TRACE_LLM_API_KEY=${TRACE_LLM_API_KEY:-}
      - TRACE_LLM_URL=${TRACE_LLM_URL:-}
    command: ["server", "--http-addr", ":8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "trace", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  edge:
    build: .
    depends_on:
      - server
    volumes:
      - trace_edge_data:/home/trace/.trace
      - ./logs:/logs:ro
    environment:
      - TRACE_VT_API_KEY=${TRACE_VT_API_KEY:-}
    command: ["serve", "--server-addr", "http://server:8080", "--siem", "--log-dir", "/logs"]
    restart: unless-stopped
    profiles:
      - edge

  edge2:
    build: .
    depends_on:
      - server
    volumes:
      - trace_edge2_data:/home/trace/.trace
    command: ["serve", "--server-addr", "http://server:8080"]
    restart: unless-stopped
    profiles:
      - edge2

volumes:
  trace_data:
  trace_edge_data:
  trace_edge2_data:
