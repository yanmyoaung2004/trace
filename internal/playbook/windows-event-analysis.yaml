name: windows-event-analysis
description: Analyze a Windows Event Log entry for suspicious activity
triggers:
  - windows event
  - event log
  - 4625
  - 4688
  - 4104
  - 4698
  - 7045
  - 1116
  - 4740
steps:
  - agent: archive
    action: ioc_enrich
    params:
      ioc: ${input.ioc}
    optional: true
  - agent: archive
    action: mitre_lookup
    params:
      technique: ${input.technique}
    optional: true
  - agent: archive
    action: web_search
    params:
      query: Windows Event ${input.event_id} ${input.event_description} security
    optional: true
  - agent: sift
    action: hash_lookup
    params:
      hash: ${input.hash}
    optional: true
