name: file-analysis
description: Analyze a file with YARA, PE scan, and hash lookup
triggers:
  - file
  - malware
  - exe
  - binary
  - pe
  - analyze file
steps:
  - agent: sift
    action: hash_lookup
    params:
      hash: ${input.hash}
    optional: true
  - agent: sift
    action: yara_scan
    params:
      path: ${input.path}
  - agent: sift
    action: pe_analyze
    params:
      path: ${input.path}
  - agent: archive
    action: ioc_enrich
    params:
      ioc: ${input.hash}
    optional: true
