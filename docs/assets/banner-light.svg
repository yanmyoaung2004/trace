<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0969da"/>
      <stop offset="100%" stop-color="#1a7f37"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0969da" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1a7f37" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect width="800" height="200" rx="12" fill="url(#glow)"/>

  <!-- Grid pattern subtle -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#0969da" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#0969da" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#0969da" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#0969da" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#0969da" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="200" stroke="#0969da" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="200" stroke="#0969da" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="200" stroke="#0969da" stroke-width="0.5"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(48, 50)">
    <path d="M32 4 L60 16 L60 72 C60 104 32 120 32 120 C32 120 4 104 4 72 L4 16 Z" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M20 60 L28 72 L44 48" fill="none" stroke="#1a7f37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="120" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#1f2328" letter-spacing="-0.5">InnoIgniterAI</text>

  <!-- Tagline -->
  <text x="120" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#656d76" letter-spacing="0.3">Multi-agent cybersecurity investigation platform</text>

  <!-- Status dots -->
  <circle cx="120" cy="130" r="4" fill="#1a7f37"/>
  <text x="132" y="134" font-family="monospace" font-size="11" fill="#656d76">10 agents online</text>

  <circle cx="260" cy="130" r="4" fill="#9a6700"/>
  <text x="272" y="134" font-family="monospace" font-size="11" fill="#656d76">20 playbooks loaded</text>

  <circle cx="420" cy="130" r="4" fill="#0969da"/>
  <text x="432" y="134" font-family="monospace" font-size="11" fill="#656d76">16 SIEM rules active</text>

  <!-- Terminal line -->
  <rect x="40" y="152" width="720" height="32" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="52" y="173" font-family="monospace" font-size="13" fill="#0969da">&gt;</text>
  <text x="68" y="173" font-family="monospace" font-size="13" fill="#656d76">innoigniter investigate</text>
  <text x="250" y="173" font-family="monospace" font-size="13" fill="#9a6700">--playbook ip-enrich</text>
  <text x="440" y="173" font-family="monospace" font-size="13" fill="#656d76">--param ip=</text>
  <text x="528" y="173" font-family="monospace" font-size="13" fill="#cf222e">185.220.101.24</text>
</svg>
